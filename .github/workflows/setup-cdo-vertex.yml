          create_file "shared/CHANGELOG.md" \
            "IyBzaGFyZWQg4oCUIENoYW5nZWxvZwoKIyMgWzAuMS4wXSDigJQgSW5pdGlhbCBzdHJ1Y3R1cmUKLSBNb2R1bGUgc2NhZmZvbGQgY3JlYXRlZAo=" \
