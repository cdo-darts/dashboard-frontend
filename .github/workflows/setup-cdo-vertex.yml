name: Setup cdo-vertex Repository

# Required secret: ORG_PAT — a fine-grained personal access token scoped to the
# cdodarts organisation with the following permissions:
#   - Administration: Read and Write  (to create the repository)
#   - Contents: Read and Write        (to create files)
#   - Metadata: Read-only             (implicit)

on:
  workflow_dispatch:

jobs:
  create-repo:
    runs-on: ubuntu-latest
    # All GitHub API calls use ORG_PAT, so GITHUB_TOKEN needs no permissions.
    permissions: {}
    env:
      GH_TOKEN: ${{ secrets.ORG_PAT }}
      ORG: cdodarts
      REPO: cdo-vertex

    steps:
      - name: Create cdo-vertex repository
        run: |
          gh api \
            --method POST \
            /orgs/$ORG/repos \
            -f name="$REPO" \
            -f description="Modular software system for the CDO Vertex dart board device (Raspberry Pi 5)" \
            -F private=true \
            -F auto_init=false
          echo "Repository created: https://github.com/$ORG/$REPO"

      - name: Create files via GitHub Contents API
        run: |
          create_file() {
            local path="$1"
            local content_b64="$2"
            local message="$3"
            gh api \
              --method PUT \
              /repos/$ORG/$REPO/contents/$path \
              -f message="$message" \
              -f content="$content_b64"
            echo "Created: $path"
          }

          # ── README.md ─────────────────────────────────────────────────────
          create_file "README.md" \
            "" \
            "chore: add README"

          # ── core/initialise ───────────────────────────────────────────────
          create_file "core/initialise/version.json" \
            "ewogICJtb2R1bGUiOiAiaW5pdGlhbGlzZSIsCiAgInZlcnNpb24iOiAiMC4xLjAiLAogICJkZXNjcmlwdGlvbiI6ICJSdW5zIG9uY2Ugb24gZmlyc3QgYm9vdC4gR2VuZXJhdGVzIFVVSUQsIHNldHMgaG9zdG5hbWUsIGVuYWJsZXMgQmx1ZXRvb3RoIGFuZCBXaUZpLCB3cml0ZXMgc2hhcmVkIGNvbmZpZy4iCn0K" \
            "chore: add core/initialise scaffold"
          create_file "core/initialise/CHANGELOG.md" \
            "IyBpbml0aWFsaXNlIOKAlCBDaGFuZ2Vsb2cKCiMjIFswLjEuMF0g4oCUIEluaXRpYWwgc3RydWN0dXJlCi0gTW9kdWxlIHNjYWZmb2xkIGNyZWF0ZWQK" \
            "chore: add core/initialise scaffold"

          # ── core/boot ─────────────────────────────────────────────────────
